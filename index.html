<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROX Market</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QR4T2KMQXH"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-QR4T2KMQXH');
</script>

<body>
    <div class="app-shell">
        <nav class="sidebar">
            <button class="sidebar-toggle" title="Свернуть меню">☰</button>
            <div class="sidebar-nav">
                <button class="nav-tab active" data-view="market">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Market</span>
                </button>
                <button class="nav-tab" data-view="enchant">
                    <span class="nav-icon">✨</span>
                    <span class="nav-label">Enchantment</span>
                </button>
                <button class="nav-tab" data-view="gardening">
                    <span class="nav-icon">🌱</span>
                    <span class="nav-label">Gardening</span>
                </button>
                <button class="nav-tab" data-view="mining">
                    <span class="nav-icon">⛏️</span>
                    <span class="nav-label">Mining</span>
                </button>
            </div>
        </nav>

        <div class="main-content">
            <div id="view-market">
                <div class="container">
                    <header class="header">
                        <h1>ROX Market</h1>
                        <p class="subtitle">Калькулятор цен и себестоимости</p>
                    </header>

                    <div class="controls">
                        <input type="text" id="search" class="search-input" placeholder="Поиск по названию...">
                        <select id="type-filter" class="filter-select">
                            <option value="all">Все типы</option>
                            <option value="mining">Добыча</option>
                            <option value="fishing">Рыболовство</option>
                            <option value="gathering">Собирательство</option>
                            <option value="crafting">Создание</option>
                        </select>
                        <select id="sort-select" class="filter-select">
                            <option value="margin-desc">Маржа ↓</option>
                            <option value="margin-asc">Маржа ↑</option>
                            <option value="price-desc">Цена ↓</option>
                            <option value="price-asc">Цена ↑</option>
                            <option value="name-asc">Название A-Z</option>
                        </select>
                        <select id="tax-select" class="filter-select">
                            <option value="0">Налог: 0%</option>
                            <option value="5">Налог: 5%</option>
                            <option value="10" selected>Налог: 10%</option>
                            <option value="15">Налог: 15%</option>
                        </select>
                        <button id="reset-prices" class="btn btn-danger">Сбросить цены</button>
                        <button id="export-prices" class="btn btn-secondary">Экспорт</button>
                        <button id="import-prices" class="btn btn-secondary">Импорт</button>
                    </div>

                    <div id="resources-list" class="resources-list">
                        <!-- Ресурсы будут загружены через JS -->
                    </div>
                </div>
            </div>

            <div id="view-enchant" class="hidden">
                <div class="container">
                    <header class="header">
                        <h1>Enchantment</h1>
                        <p class="subtitle">Калькулятор зачарования</p>
                    </header>

                    <div class="enchant-form">
                        <div class="enchant-slot-row">
                            <label class="slot-label">
                                <input type="checkbox" class="slot-enable" data-slot="weapon" checked>
                                <span>Оружие</span>
                            </label>
                            <div class="slot-levels">
                                <select class="slot-from" data-slot="weapon">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                </select>
                                <span class="slot-arrow">→</span>
                                <select class="slot-to" data-slot="weapon">
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10" selected>10</option>
                                </select>
                            </div>
                        </div>

                        <div class="enchant-slot-row">
                            <label class="slot-label">
                                <input type="checkbox" class="slot-enable" data-slot="armor">
                                <span>Броня</span>
                            </label>
                            <div class="slot-levels">
                                <select class="slot-from" data-slot="armor">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                </select>
                                <span class="slot-arrow">→</span>
                                <select class="slot-to" data-slot="armor">
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10" selected>10</option>
                                </select>
                            </div>
                        </div>

                        <div class="enchant-slot-row">
                            <label class="slot-label">
                                <input type="checkbox" class="slot-enable" data-slot="accessory">
                                <span>Аксессуар</span>
                            </label>
                            <div class="slot-levels">
                                <select class="slot-from" data-slot="accessory">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                </select>
                                <span class="slot-arrow">→</span>
                                <select class="slot-to" data-slot="accessory">
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10" selected>10</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div id="enchant-results">
                        <!-- Results rendered by JS -->
                    </div>
                </div>
            </div>

            <div id="view-gardening" class="hidden">
                <div class="container">
                    <header class="header">
                        <h1>Gardening</h1>
                        <p class="subtitle">Калькулятор выгоды собирательства</p>
                    </header>
                    <div id="gardening-results">
                        <!-- Results rendered by JS -->
                    </div>
                </div>
            </div>

            <div id="view-mining" class="hidden">
                <div class="container mining-container">
                    <header class="header">
                        <h1>Mining</h1>
                        <p class="subtitle">Калькулятор профита от добычи</p>
                    </header>
                    <div id="mining-results">
                        <!-- Results rendered by JS -->
                    </div>
                </div>
            </div>

            <div id="detail-modal" class="modal hidden">
                <div class="modal-content">
                    <button class="modal-close" id="modal-close">&times;</button>
                    <div id="detail-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/enchantment.js"></script>
    <script src="js/gardening.js"></script>
    <script src="js/mining.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
